name: Release Assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version || '' }}" ]]; then
            version='${{ inputs.version }}'
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$version" >> "$GITHUB_OUTPUT"
          echo "release_base_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/v$version/" >> "$GITHUB_OUTPUT"

      - name: Validate release artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          version='${{ steps.version.outputs.version }}'
          required_files=(
            "geo-${version}.db"
            "geo-${version}.db.sha256"
            "geo-${version}.spx"
            "subdistrict-${version}.db"
            "subdistrict-${version}.db.sha256"
            "cities-${version}.fst"
            "cities-${version}.fst.sha256"
            "cities-${version}.rkyv"
            "cities-${version}.rkyv.sha256"
            "cities-${version}.points"
            "cities-${version}.points.sha256"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required release artifact: $file" >&2
              exit 1
            fi
          done

      - name: Build release manifest
        run: |
          cargo run --bin build_assets_manifest -- \
            --version '${{ steps.version.outputs.version }}' \
            --geo "geo-${{ steps.version.outputs.version }}.db" \
            --subdistrict "subdistrict-${{ steps.version.outputs.version }}.db" \
            --city-fst "cities-${{ steps.version.outputs.version }}.fst" \
            --city-rkyv "cities-${{ steps.version.outputs.version }}.rkyv" \
            --city-points "cities-${{ steps.version.outputs.version }}.points" \
            --base-url '${{ steps.version.outputs.release_base_url }}' \
            --output assets-manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
          files: |
            geo-${{ steps.version.outputs.version }}.db
            geo-${{ steps.version.outputs.version }}.db.sha256
            geo-${{ steps.version.outputs.version }}.spx
            subdistrict-${{ steps.version.outputs.version }}.db
            subdistrict-${{ steps.version.outputs.version }}.db.sha256
            cities-${{ steps.version.outputs.version }}.fst
            cities-${{ steps.version.outputs.version }}.fst.sha256
            cities-${{ steps.version.outputs.version }}.rkyv
            cities-${{ steps.version.outputs.version }}.rkyv.sha256
            cities-${{ steps.version.outputs.version }}.points
            cities-${{ steps.version.outputs.version }}.points.sha256
            assets-manifest.json
